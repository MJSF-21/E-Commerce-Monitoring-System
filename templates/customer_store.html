<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - E-Commerce Monitoring System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .store-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin: 20px auto;
            max-width: 1400px;
        }
        .header-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px 20px 0 0;
            padding: 2rem;
        }
        .product-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            border: none;
            height: 100%;
            overflow: hidden;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }
        .product-image {
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
        }
        .product-actions {
            padding: 1rem;
            background: rgba(102, 126, 234, 0.05);
        }
        .cart-sidebar {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            padding: 1.5rem;
            position: sticky;
            top: 20px;
        }
        .cart-item {
            padding: 0.5rem 0;
            border-bottom: 1px solid #eee;
        }
        .cart-item:last-child {
            border-bottom: none;
        }
        .filter-section {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .btn-shop {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
        }
        .btn-shop:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-wishlist {
            background: transparent;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            border-radius: 25px;
            padding: 8px 20px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-wishlist:hover {
            background: #e74c3c;
            color: white;
        }
        .badge-stock {
            font-size: 0.8rem;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
        }
        .price-tag {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }
        .sidebar {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }
        .sidebar .nav-link {
            color: white;
            padding: 1rem;
            margin: 0.2rem 0;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }
    </style>
</head>
<body>
    <div class="container-fluid p-3">
        <div class="store-container">
            <!-- Header -->
            <div class="header-section">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <div class="d-flex align-items-center">
                            <i class="fas fa-shopping-bag fa-3x me-4"></i>
                            <div>
                                <h2 class="mb-1">Shop Our Products</h2>
                                <p class="mb-0">Discover amazing deals and quality products</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 text-end">
                        <div class="d-flex align-items-center justify-content-end">
                            <span class="badge bg-warning text-dark me-3">{{ session.role|title }}</span>
                            <a href="/customer" class="btn btn-outline-light me-2">
                                <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                            </a>
                            <a href="/logout" class="btn btn-outline-light">
                                <i class="fas fa-sign-out-alt me-2"></i>Logout
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="p-4">
                <div class="row">
                    <!-- Sidebar -->
                    <div class="col-md-3">
                        <div class="sidebar">
                            <div class="text-center mb-4">
                                <i class="fas fa-user fa-3x mb-3"></i>
                                <h5>{{ session.full_name or session.username }}</h5>
                            </div>
                            <ul class="nav flex-column">
                                <li class="nav-item">
                                    <a class="nav-link" href="/customer">
                                        <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link active" href="/customer/store">
                                        <i class="fas fa-shopping-cart me-2"></i>Shop Now
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" href="#" onclick="showCart()">
                                        <i class="fas fa-shopping-basket me-2"></i>My Cart (<span id="cartCount">0</span>)
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" href="#" onclick="showWishlist()">
                                        <i class="fas fa-heart me-2"></i>Wishlist (<span id="wishlistCount">0</span>)
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" href="#" onclick="showOrderHistory()">
                                        <i class="fas fa-history me-2"></i>Order History
                                    </a>
                                </li>
                                <li class="nav-item mt-4">
                                    <a class="nav-link text-danger" href="/logout">
                                        <i class="fas fa-sign-out-alt me-2"></i>Logout
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>

                    <!-- Products Section -->
                    <div class="col-md-9">
                        <!-- Search and Filter -->
                        <div class="row mb-4">
                            <div class="col-md-8">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-search"></i></span>
                                    <input type="text" class="form-control" id="searchInput" placeholder="Search products...">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <select class="form-select" id="categoryFilter">
                                    <option value="">All Categories</option>
                                    <option value="1">Electronics</option>
                                    <option value="2">Furniture</option>
                                    <option value="3">Office Supplies</option>
                                    <option value="4">Accessories</option>
                                    <option value="5">Software</option>
                                </select>
                            </div>
                        </div>

                        <!-- Products Grid -->
                        <div class="row" id="productsGrid">
                            <!-- Products will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Cart Modal -->
    <div class="modal fade" id="cartModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">My Shopping Cart</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="cartContent">
                        <!-- Cart items will be loaded here -->
                    </div>
                </div>
                <div class="modal-footer">
                    <div class="d-flex justify-content-between w-100">
                        <div>
                            <h5>Total: $<span id="cartTotal">0.00</span></h5>
                        </div>
                        <div>
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Continue Shopping</button>
                            <button type="button" class="btn btn-shop" onclick="checkout()">Checkout</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Wishlist Modal -->
    <div class="modal fade" id="wishlistModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">My Wishlist</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="wishlistContent">
                        <!-- Wishlist items will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Order History Modal -->
    <div class="modal fade" id="orderHistoryModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Order History</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="orderHistoryContent">
                        <!-- Order history will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script>
        let products = [];
        let cart = [];
        let wishlist = [];
        let customerOrders = [];

        // Load products and customer data
        async function loadStoreData() {
            try {
                const [productsRes, cartRes, wishlistRes, ordersRes] = await Promise.all([
                    fetch('/api/products'),
                    fetch('/api/customer/cart'),
                    fetch('/api/customer/wishlist'),
                    fetch('/api/customer/orders')
                ]);

                products = await productsRes.json();
                cart = await cartRes.json();
                wishlist = await wishlistRes.json();
                customerOrders = await ordersRes.json();

                renderProducts();
                updateCartCount();
                updateWishlistCount();
            } catch (error) {
                console.error('Error loading store data:', error);
            }
        }

        function renderProducts() {
            const container = document.getElementById('productsGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value;

            let filteredProducts = products.filter(product => {
                const matchesSearch = product.name.toLowerCase().includes(searchTerm) || 
                                     (product.description && product.description.toLowerCase().includes(searchTerm));
                const matchesCategory = !categoryFilter || product.category_id == categoryFilter;
                return matchesSearch && matchesCategory && product.active;
            });

            container.innerHTML = filteredProducts.map(product => `
                <div class="col-md-4 mb-4">
                    <div class="product-card">
                        <div class="product-image">
                            <i class="fas fa-box"></i>
                        </div>
                        <div class="card-body">
                            <h5 class="card-title">${product.name}</h5>
                            <p class="card-text text-muted">${product.description || 'Great product for you'}</p>
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <span class="price-tag">$${product.price.toFixed(2)}</span>
                                <span class="badge ${product.stock > 5 ? 'bg-success' : 'bg-warning'} badge-stock">
                                    ${product.stock > 5 ? 'In Stock' : `Only ${product.stock} left`}
                                </span>
                            </div>
                            <div class="product-actions">
                                <div class="d-grid gap-2">
                                    <button class="btn btn-shop" onclick="addToCart(${product.id})" ${product.stock === 0 ? 'disabled' : ''}>
                                        <i class="fas fa-cart-plus me-2"></i>Add to Cart
                                    </button>
                                    <button class="btn btn-wishlist" onclick="toggleWishlist(${product.id})">
                                        <i class="fas fa-heart me-2"></i>
                                        <span id="wishlist-${product.id}">${isInWishlist(product.id) ? 'Remove from Wishlist' : 'Add to Wishlist'}</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function isInWishlist(productId) {
            return wishlist.items && wishlist.items.some(item => item.product_id === productId);
        }

        async function addToCart(productId, quantity = 1) {
            try {
                // Get product details for better feedback
                const product = products.find(p => p.id === productId);
                
                // Check stock availability
                if (product && product.stock < quantity) {
                    showNotification(`Only ${product.stock} items available in stock!`, 'warning');
                    return;
                }

                // Show loading state
                const button = document.querySelector(`button[onclick="addToCart(${productId})"]`);
                const originalText = button.innerHTML;
                button.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Adding...';
                button.disabled = true;

                const response = await fetch('/api/customer/cart/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ product_id: productId, quantity: quantity })
                });

                if (response.ok) {
                    const result = await response.json();
                    cart = result.cart;
                    updateCartCount();
                    
                    // Show success notification with product details
                    showNotification(
                        `${product.name} (${quantity}x) added to cart!`, 
                        'success',
                        { 
                            action: 'View Cart',
                            callback: () => showCart()
                        }
                    );
                    
                    // Update button state
                    updateCartButton(productId);
                    
                    // Add animation effect
                    animateCartIcon();
                } else {
                    const error = await response.json();
                    showNotification(error.error || 'Error adding product to cart', 'error');
                }
            } catch (error) {
                console.error('Error adding to cart:', error);
                showNotification('Error adding product to cart', 'error');
            } finally {
                // Restore button state
                const button = document.querySelector(`button[onclick="addToCart(${productId})"]`);
                if (button) {
                    button.innerHTML = originalText;
                    button.disabled = false;
                }
            }
        }

        async function toggleWishlist(productId) {
            try {
                if (isInWishlist(productId)) {
                    const response = await fetch('/api/customer/wishlist/remove', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ product_id: productId })
                    });
                    
                    if (response.ok) {
                        wishlist = await response.json();
                        updateWishlistCount();
                        renderProducts();
                    }
                } else {
                    const response = await fetch('/api/customer/wishlist/add', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ product_id: productId })
                    });
                    
                    if (response.ok) {
                        wishlist = await response.json();
                        updateWishlistCount();
                        renderProducts();
                    }
                }
            } catch (error) {
                console.error('Error toggling wishlist:', error);
                alert('Error updating wishlist');
            }
        }

        function updateCartCount() {
            const count = cart.items ? cart.items.length : 0;
            document.getElementById('cartCount').textContent = count;
        }

        // Enhanced Cart Functions
        function showNotification(message, type = 'info', options = {}) {
            // Create notification element
            const notification = document.createElement('div');
            notification.className = `alert alert-${type} alert-dismissible fade show position-fixed`;
            notification.style.cssText = 'top: 20px; right: 20px; z-index: 9999; min-width: 300px;';
            notification.innerHTML = `
                ${message}
                ${options.action ? `<button type="button" class="btn btn-sm btn-outline-${type} ms-2" onclick="(${options.callback})()">${options.action}</button>` : ''}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            document.body.appendChild(notification);
            
            // Auto-remove after 5 seconds
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.remove();
                }
            }, 5000);
        }

        function updateCartButton(productId) {
            const button = document.querySelector(`button[onclick="addToCart(${productId})"]`);
            if (button) {
                // Check if product is in cart
                const cartItem = cart.items ? cart.items.find(item => item.product_id === productId) : null;
                if (cartItem) {
                    button.innerHTML = `<i class="fas fa-check me-2"></i>In Cart (${cartItem.quantity})`;
                    button.className = 'btn btn-success';
                } else {
                    button.innerHTML = '<i class="fas fa-cart-plus me-2"></i>Add to Cart';
                    button.className = 'btn btn-shop';
                }
            }
        }

        function animateCartIcon() {
            const cartIcon = document.getElementById('cartCount');
            if (cartIcon) {
                cartIcon.style.transform = 'scale(1.5)';
                cartIcon.style.transition = 'transform 0.3s ease';
                
                setTimeout(() => {
                    cartIcon.style.transform = 'scale(1)';
                }, 300);
            }
        }

        async function updateCartQuantity(productId, change) {
            try {
                const cartItem = cart.items ? cart.items.find(item => item.product_id === productId) : null;
                if (!cartItem) return;

                const newQuantity = cartItem.quantity + change;
                const product = products.find(p => p.id === productId);

                if (newQuantity <= 0) {
                    await removeFromCart(productId);
                    return;
                }

                if (product && product.stock < newQuantity) {
                    showNotification(`Only ${product.stock} items available in stock!`, 'warning');
                    return;
                }

                const response = await fetch('/api/customer/cart/update', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        product_id: productId, 
                        quantity: newQuantity 
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    cart = result.cart;
                    updateCartCount();
                    showCart(); // Refresh cart modal
                    showNotification('Cart updated successfully!', 'success');
                } else {
                    showNotification('Error updating cart quantity', 'error');
                }
            } catch (error) {
                console.error('Error updating cart quantity:', error);
                showNotification('Error updating cart', 'error');
            }
        }

        async function clearCart() {
            if (confirm('Are you sure you want to clear your entire cart?')) {
                try {
                    const response = await fetch('/api/customer/cart/clear', {
                        method: 'POST'
                    });

                    if (response.ok) {
                        cart = { items: [], total: 0 };
                        updateCartCount();
                        showNotification('Cart cleared successfully!', 'success');
                        
                        // Update all cart buttons
                        products.forEach(product => updateCartButton(product.id));
                    } else {
                        showNotification('Error clearing cart', 'error');
                    }
                } catch (error) {
                    console.error('Error clearing cart:', error);
                    showNotification('Error clearing cart', 'error');
                }
            }
        }

        function updateWishlistCount() {
            const count = wishlist.items ? wishlist.items.length : 0;
            document.getElementById('wishlistCount').textContent = count;
        }

        async function showCart() {
            try {
                const response = await fetch('/api/customer/cart');
                const cartData = await response.json();
                const content = document.getElementById('cartContent');
                
                if (!cartData.items || cartData.items.length === 0) {
                    content.innerHTML = `
                        <div class="text-center py-4">
                            <i class="fas fa-shopping-cart fa-3x text-muted mb-3"></i>
                            <h5 class="text-muted">Your cart is empty</h5>
                            <p class="text-muted">Start shopping to add items to your cart!</p>
                            <button class="btn btn-primary" onclick="bootstrap.Modal.getInstance(document.getElementById('cartModal')).hide()">
                                <i class="fas fa-shopping-bag me-2"></i>Continue Shopping
                            </button>
                        </div>
                    `;
                } else {
                    content.innerHTML = cartData.items.map(item => `
                        <div class="cart-item border-bottom pb-3 mb-3">
                            <div class="row align-items-center">
                                <div class="col-md-5">
                                    <h6 class="mb-1">${item.name}</h6>
                                    <p class="text-muted mb-0 small">Unit Price: $${item.price.toFixed(2)}</p>
                                </div>
                                <div class="col-md-3">
                                    <div class="input-group input-group-sm">
                                        <button class="btn btn-outline-secondary" onclick="updateCartQuantity(${item.product_id}, -1)">
                                            <i class="fas fa-minus"></i>
                                        </button>
                                        <input type="number" class="form-control text-center" value="${item.quantity}" min="1" readonly>
                                        <button class="btn btn-outline-secondary" onclick="updateCartQuantity(${item.product_id}, 1)">
                                            <i class="fas fa-plus"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="col-md-2">
                                    <div class="text-end">
                                        <strong>$${(item.price * item.quantity).toFixed(2)}</strong>
                                    </div>
                                </div>
                                <div class="col-md-2 text-end">
                                    <button class="btn btn-sm btn-outline-danger" onclick="removeFromCart(${item.product_id})">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
                
                document.getElementById('cartTotal').textContent = cartData.total.toFixed(2);
                new bootstrap.Modal(document.getElementById('cartModal')).show();
            } catch (error) {
                console.error('Error loading cart:', error);
            }
        }

        async function removeFromCart(productId) {
            try {
                const response = await fetch('/api/customer/cart/remove', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ product_id: productId })
                });
                
                if (response.ok) {
                    const result = await response.json();
                    cart = result.cart;
                    showCart(); // Refresh cart modal
                    updateCartCount();
                }
            } catch (error) {
                console.error('Error removing from cart:', error);
            }
        }

        async function showWishlist() {
            try {
                const response = await fetch('/api/customer/wishlist');
                const wishlistData = await response.json();
                const content = document.getElementById('wishlistContent');
                
                if (!wishlistData.items || wishlistData.items.length === 0) {
                    content.innerHTML = '<p class="text-muted">Your wishlist is empty. Start adding items you love!</p>';
                } else {
                    content.innerHTML = wishlistData.items.map(item => `
                        <div class="row mb-3 align-items-center">
                            <div class="col-md-6">
                                <h6>${item.name}</h6>
                                <p class="text-muted mb-0">Added: ${new Date(item.added_at).toLocaleDateString()}</p>
                            </div>
                            <div class="col-md-3">
                                <span class="badge bg-primary">$${item.price.toFixed(2)}</span>
                            </div>
                            <div class="col-md-3 text-end">
                                <button class="btn btn-sm btn-primary me-2" onclick="addToCart(${item.product_id})">
                                    <i class="fas fa-cart-plus"></i> Add to Cart
                                </button>
                                <button class="btn btn-sm btn-outline-danger" onclick="removeFromWishlist(${item.product_id})">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    `).join('');
                }
                
                new bootstrap.Modal(document.getElementById('wishlistModal')).show();
            } catch (error) {
                console.error('Error loading wishlist:', error);
            }
        }

        async function removeFromWishlist(productId) {
            try {
                const response = await fetch('/api/customer/wishlist/remove', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ product_id: productId })
                });
                
                if (response.ok) {
                    wishlist = await response.json();
                    showWishlist(); // Refresh wishlist modal
                    updateWishlistCount();
                    renderProducts(); // Update product buttons
                }
            } catch (error) {
                console.error('Error removing from wishlist:', error);
            }
        }

        function showOrderHistory() {
            const content = document.getElementById('orderHistoryContent');
            content.innerHTML = customerOrders.length === 0 ? 
                '<p class="text-muted">No orders yet.</p>' :
                customerOrders.map(order => `
                    <div class="order-item">
                        <div class="row">
                            <div class="col-md-3">
                                <strong>${order.sale_number}</strong><br>
                                <small class="text-muted">${new Date(order.sale_date).toLocaleDateString()}</small>
                            </div>
                            <div class="col-md-3">
                                <span class="badge bg-success">${order.status || 'Completed'}</span>
                            </div>
                            <div class="col-md-3">
                                <strong>$${order.total.toFixed(2)}</strong>
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-sm btn-outline-primary" onclick="viewOrderDetails(${order.id})">
                                    View Details
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            
            new bootstrap.Modal(document.getElementById('orderHistoryModal')).show();
        }

        function viewOrderDetails(orderId) {
            const order = customerOrders.find(o => o.id === orderId);
            if (order) {
                alert(`Order Details:\n\nOrder: ${order.sale_number}\nDate: ${new Date(order.sale_date).toLocaleDateString()}\nTotal: $${order.total.toFixed(2)}\nItems: ${order.items.length}\nStatus: ${order.status || 'Completed'}`);
            }
        }

        async function checkout() {
            try {
                const response = await fetch('/api/customer/cart');
                const cartData = await response.json();
                
                if (!cartData.items || cartData.items.length === 0) {
                    alert('Your cart is empty. Add some products first!');
                    return;
                }
                
                // Show checkout modal
                showCheckoutModal(cartData);
            } catch (error) {
                console.error('Error preparing checkout:', error);
                alert('Error preparing checkout');
            }
        }

        function showCheckoutModal(cartData) {
            const modalHtml = `
                <div class="modal fade" id="checkoutModal" tabindex="-1">
                    <div class="modal-dialog modal-lg">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Checkout</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <form id="checkoutForm">
                                    <div class="row">
                                        <div class="col-md-6">
                                            <h6>Order Summary</h6>
                                            <div class="order-summary">
                                                ${cartData.items.map(item => `
                                                    <div class="d-flex justify-content-between mb-2">
                                                        <span>${item.name} x${item.quantity}</span>
                                                        <span>$${item.subtotal.toFixed(2)}</span>
                                                    </div>
                                                `).join('')}
                                                <hr>
                                                <div class="d-flex justify-content-between mb-2">
                                                    <strong>Subtotal:</strong>
                                                    <span>$${cartData.total.toFixed(2)}</span>
                                                </div>
                                                <div class="d-flex justify-content-between mb-2">
                                                    <strong>Tax (8%):</strong>
                                                    <span>$${(cartData.total * 0.08).toFixed(2)}</span>
                                                </div>
                                                <div class="d-flex justify-content-between">
                                                    <strong>Total:</strong>
                                                    <strong>$${(cartData.total * 1.08).toFixed(2)}</strong>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <h6>Delivery Information</h6>
                                            <div class="mb-3">
                                                <label class="form-label">Delivery Address</label>
                                                <textarea class="form-control" id="deliveryAddress" rows="3" placeholder="Enter your delivery address"></textarea>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Payment Method</label>
                                                <select class="form-select" id="paymentMethod">
                                                    <option value="cash">Cash on Delivery</option>
                                                    <option value="card">Credit/Debit Card</option>
                                                    <option value="paypal">PayPal</option>
                                                </select>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Order Notes (Optional)</label>
                                                <textarea class="form-control" id="orderNotes" rows="2" placeholder="Any special instructions..."></textarea>
                                            </div>
                                        </div>
                                    </div>
                                </form>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                <button type="button" class="btn btn-shop" onclick="processCheckout()">Place Order</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Remove existing checkout modal if any
            const existingModal = document.getElementById('checkoutModal');
            if (existingModal) {
                existingModal.remove();
            }
            
            // Add new modal to body
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            
            // Show modal
            const modal = new bootstrap.Modal(document.getElementById('checkoutModal'));
            modal.show();
        }

        async function processCheckout() {
            try {
                const checkoutData = {
                    delivery_address: document.getElementById('deliveryAddress').value,
                    payment_method: document.getElementById('paymentMethod').value,
                    notes: document.getElementById('orderNotes').value
                };
                
                const response = await fetch('/api/customer/checkout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(checkoutData)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // Close checkout modal
                    bootstrap.Modal.getInstance(document.getElementById('checkoutModal')).hide();
                    
                    // Close cart modal
                    bootstrap.Modal.getInstance(document.getElementById('cartModal')).hide();
                    
                    // Show success message
                    alert(result.message + '\\n\\nOrder Number: ' + result.sale.sale_number + '\\nTotal: $' + result.sale.total.toFixed(2));
                    
                    // Reload data to update cart count
                    loadStoreData();
                } else {
                    alert(result.error || 'Error processing checkout');
                }
            } catch (error) {
                console.error('Error processing checkout:', error);
                alert('Error processing checkout');
            }
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', renderProducts);
        document.getElementById('categoryFilter').addEventListener('change', renderProducts);

        // WebSocket connection for real-time updates
        const socket = io();
        socket.on('connect', function() {
            console.log('Connected to server');
        });

        // Load data when page loads
        document.addEventListener('DOMContentLoaded', loadStoreData);
    </script>
</body>
</html>
